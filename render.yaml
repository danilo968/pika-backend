# Render Blueprint — Pika Backend
# https://docs.render.com/infrastructure-as-code

databases:
  - name: pika-db
    plan: free
    databaseName: pika_db
    user: pika_user
    postgresMajorVersion: "16"

services:
  - type: web
    name: pika-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run migrate-and-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pika-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://pika-app-bay.vercel.app
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: "10485760"
